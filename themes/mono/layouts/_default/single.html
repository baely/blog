{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ if or (not .Date.IsZero) .Params.tags }}
    <div class="post-meta">
      {{ if not .Date.IsZero }}
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ end }}
      {{ with .Params.tags }}
      <span class="post-tags">
        {{ range . }}
          <a class="post-tag" href="{{ "tags/" | absURL }}{{ . | urlize }}/">{{ . }}</a>
        {{ end }}
      </span>
      {{ end }}
    </div>
    {{ end }}
  </header>
  <hr class="post-divider">
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
